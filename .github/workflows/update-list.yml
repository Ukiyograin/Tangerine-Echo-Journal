name: 自动更新文章列表

on:
  push:
    paths:
      - 'docs/**/*.md'
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  update-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 生成 list.txt（带最后修改日期）
        run: |
          cd docs
          # 清空 list.txt
          > list.txt
          
          # 遍历所有 .md 文件，按文件名排序
          for file in $(ls -1 *.md 2>/dev/null | sort); do
            # 获取该文件的最后 commit 日期（ISO 格式 YYYY-MM-DD）
            last_date=$(git log -1 --format=%as -- "$file" 2>/dev/null || git log -1 --format=%ci -- "$file" 2>/dev/null | cut -d' ' -f1)
            
            # 如果 git log 没取到（新文件未提交），用当前日期
            if [ -z "$last_date" ]; then
              last_date=$(date +%Y-%m-%d)
            fi
            
            # 写入格式: 文件名|日期
            echo "${file}|${last_date}" >> list.txt
          done
          
          echo "已生成 list.txt："
          cat list.txt

      - name: 检查是否有变更
        id: check
        run: |
          if git diff --quiet docs/list.txt; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "list.txt 无变化"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "list.txt 需要更新"
          fi

      - name: 提交变更
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/list.txt
          git commit -m "chore: 自动更新文章列表 [skip ci]"
          git push
