<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
    <title>柑音手账</title>
    <link rel="icon" type="image/png" href="icon/icon.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js">
    </script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fef7e8;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 235, 205, 0.6) 2%, transparent 2.5%),
                radial-gradient(circle at 85% 70%, rgba(255, 215, 170, 0.5) 1.5%, transparent 2%);
            background-size: 48px 48px, 32px 32px;
            font-family: 'Segoe UI', 'Noto Sans CJK JP', 'Helvetica Neue', 'Poppins', system-ui, -apple-system, 'Hiragino Kaku Gothic ProN', 'Yu Gothic UI', sans-serif;
            color: #3e2a1f;
            line-height: 1.6;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
        }

        .flowing-text {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 0.5rem;
            display: inline-block;
            background: linear-gradient(270deg,
                    #FF6B6B, #FFA07A, #FFD93D, #6BCB77, #4D96FF, #9B59B6, #FF6B6B,
                    #FFA07A, #FFD93D, #6BCB77, #4D96FF, #9B59B6, #FF6B6B);
            background-size: 500% auto;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: flowFullColor 20s linear infinite;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        @keyframes flowFullColor {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 500% 50%;
            }
        }

        .sub {
            color: #c2834b;
            font-size: 0.95rem;
            border-top: 2px dotted #fad7a0;
            display: inline-block;
            padding-top: 0.5rem;
            margin-top: 0.5rem;
        }

        .search-wrap {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: #fffbf4;
            border: 1px solid #ffdeac;
            border-radius: 48px;
            padding: 0.5rem 1.2rem;
            margin-bottom: 1.8rem;
            box-shadow: 0 6px 18px -8px rgba(180, 110, 30, 0.08);
            transition: 0.2s;
        }

        .search-wrap:focus-within {
            border-color: #f9a65b;
            box-shadow: 0 8px 20px -8px rgba(200, 100, 20, 0.15);
        }

        .search-wrap input {
            border: none;
            background: transparent;
            font-size: 0.9rem;
            padding: 0.4rem 0;
            outline: none;
            width: 100%;
            color: #5e3a20;
            font-family: inherit;
        }

        .search-wrap .search-icon {
            font-size: 1.2rem;
            opacity: 0.7;
        }

        .blog-grid {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .post-card {
            background: #fffaf2;
            border-radius: 42px 32px 48px 32px;
            box-shadow: 0 18px 32px -12px rgba(100, 60, 10, 0.12), 0 2px 5px rgba(0, 0, 0, 0.02);
            transition: all 0.25s ease;
            border: 1px solid #ffe1b9;
            overflow: hidden;
        }

        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 24px 40px -16px rgba(180, 90, 30, 0.2);
            border-color: #ffce96;
        }

        .post-header {
            padding: 1.6rem 2rem 0.8rem 2rem;
            border-bottom: 2px dashed #ffe0bc;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .post-icon {
            font-size: 2rem;
        }

        .post-title {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            word-break: break-word;
            flex: 1;
            background: linear-gradient(120deg, #d96c1e, #f09d4a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .post-meta {
            padding: 0.2rem 2rem 0rem 2rem;
            font-size: 0.8rem;
            color: #bb7a44;
            display: flex;
            gap: 1.2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #fff1e3;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .post-tags {
            padding: 0.2rem 2rem 0rem 2rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin-top: 0.3rem;
        }

        .post-tag {
            background: #ffe9d4;
            color: #9b5723;
            font-size: 0.7rem;
            padding: 0.15rem 0.8rem;
            border-radius: 40px;
            font-weight: 500;
        }

        .post-content {
            padding: 1.8rem 2rem 2rem 2rem;
            font-size: 1rem;
            color: #382617;
            position: relative;
            transition: max-height 0.35s ease;
        }

        .post-content.collapsed {
            max-height: 380px;
            overflow: hidden;
        }

        .post-content.collapsed::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(to top, #fffaf2, transparent);
            pointer-events: none;
            border-radius: 0 0 32px 32px;
        }

        .expand-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: #ffecd0;
            border: 1px solid #ffc68c;
            color: #b05a1f;
            padding: 0.4rem 1.6rem;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-top: 0.8rem;
            margin-left: 2rem;
            margin-bottom: 1.4rem;
            transition: 0.2s;
            font-weight: 600;
        }

        .expand-btn:hover {
            background: #ffd59b;
            border-color: #f49b41;
        }

        .post-content h1,
        .post-content h2,
        .post-content h3 {
            margin-top: 1.2em;
            margin-bottom: 0.6em;
            font-weight: 650;
            color: #c25b1a;
            border-left: 6px solid #ffbc6e;
            padding-left: 1rem;
        }

        .post-content p {
            margin-bottom: 1rem;
        }

        .post-content img {
            display: block;
            max-width: 320px;
            width: auto;
            height: auto;
            border-radius: 28px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
            margin: 1.2rem auto;
            cursor: zoom-in;
            transition: transform 0.2s;
        }

        .post-content img:hover {
            transform: scale(1.02);
            filter: brightness(1.02);
        }

        .post-content code {
            background: #fcedda;
            padding: 0.2rem 0.4rem;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
            color: #b9531a;
        }

        .post-content pre {
            background: #2d2118;
            padding: 1rem;
            border-radius: 24px;
            overflow-x: auto;
            margin: 1.2rem 0;
        }

        .post-content pre code {
            background: transparent;
            color: #fbe3c9;
            padding: 0;
        }

        .post-content blockquote {
            border-left: 4px solid #f3a257;
            background: #fff3e6;
            padding: 0.8rem 1.2rem;
            border-radius: 24px;
            margin: 1rem 0;
            font-style: italic;
            color: #794f2a;
        }

        .post-content a {
            color: #e0772e;
            text-decoration: none;
            border-bottom: 1px dashed #ffb469;
        }

        .post-content a:hover {
            color: #bc5a1a;
        }

        .loading-area,
        .empty-area {
            background: #fff6ed;
            border-radius: 64px;
            padding: 3rem 2rem;
            text-align: center;
            border: 1px solid #ffe0bd;
        }

        .spinner {
            display: inline-block;
            width: 48px;
            height: 48px;
            border: 4px solid #ffe1bd;
            border-top: 4px solid #e97c2b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.6rem;
            margin-top: 2.8rem;
            flex-wrap: wrap;
        }

        .page-btn {
            background: #fff6ed;
            border: 1px solid #ffd19a;
            color: #9b5723;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .page-btn:hover {
            background: #ffe2c1;
            border-color: #f49b41;
        }

        .page-btn.active-page {
            background: #f49b41;
            border-color: #c96c1f;
            color: white;
            box-shadow: 0 6px 14px rgba(200, 90, 20, 0.25);
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: default;
            pointer-events: none;
        }

        .floating-tag-panel {
            position: fixed;
            width: 240px;
            max-height: 400px;
            background: #fffbf4;
            border: 2px solid #ffe4bc;
            border-radius: 36px 40px 36px 40px;
            box-shadow: 0 20px 35px -10px rgba(180, 100, 20, 0.2);
            z-index: 999;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            backdrop-filter: blur(6px);
            transition: box-shadow 0.2s, width 0.2s, max-height 0.2s;
        }

        .floating-tag-panel.dragging {
            box-shadow: 0 25px 45px -10px rgba(200, 120, 30, 0.3);
            cursor: grabbing;
        }

        .panel-header {
            background: #fff8ed;
            padding: 0.7rem 1.2rem;
            border-bottom: 1px solid #ffe1bc;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 700;
            color: #c96e2b;
            font-size: 0.9rem;
        }

        .panel-header:active {
            cursor: grabbing;
        }

        .panel-body {
            padding: 0.8rem 1rem;
            overflow-y: auto;
            max-height: 280px;
            transition: max-height 0.3s;
        }

        .panel-body.expanded {
            max-height: 380px;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            list-style: none;
        }

        .tag-badge {
            background: #fff3e0;
            border: 1px solid #ffcb8c;
            color: #864c24;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.2s;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            max-width: 130px;
            overflow: hidden;
            white-space: nowrap;
        }

        .tag-badge:hover {
            background: #ffe5cc;
            border-color: #ffb652;
            transform: scale(1.02);
        }

        .tag-badge.active-tag {
            background: #f9a65b;
            border-color: #c96e2b;
            color: white;
            box-shadow: 0 4px 10px rgba(220, 130, 40, 0.25);
        }

        .tag-text {
            display: inline-block;
            white-space: nowrap;
            will-change: transform;
        }

        .tag-badge:hover .tag-text {
            animation: marquee 3s linear infinite;
        }

        @keyframes marquee {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-100%);
            }
        }

        .panel-toggle {
            background: none;
            border-top: 1px dashed #fad7a0;
            color: #c9813e;
            font-size: 0.8rem;
            padding: 0.5rem;
            cursor: pointer;
            width: 100%;
            text-align: center;
            margin-top: 0.2rem;
            background: #fffbf4;
            transition: 0.2s;
        }

        .panel-toggle:hover {
            background: #fff3e0;
        }

        .lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: zoom-out;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 32px;
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.3);
            cursor: default;
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            padding: 1.8rem;
            font-size: 0.85rem;
            color: #c3844b;
            border-top: 1px solid #ffe1bb;
        }

        .deco-leaf {
            font-size: 1.2rem;
            opacity: 0.6;
        }

        @media (max-width: 680px) {
            body {
                padding: 1rem 0.8rem;
            }
            .flowing-text {
                font-size: 2rem;
            }
            .post-title {
                font-size: 1.5rem;
            }
            .post-header {
                padding: 1rem 1.2rem;
            }
            .post-content {
                padding: 1.2rem;
            }
            .post-meta,
            .post-tags {
                padding: 0 1rem;
            }
            .floating-tag-panel {
                width: 180px;
                max-height: 320px;
                right: 10px;
                bottom: 100px;
                left: auto;
                top: auto;
                border-radius: 28px 32px 28px 32px;
            }
            .panel-body {
                max-height: 200px;
            }
            .panel-body.expanded {
                max-height: 280px;
            }
            .tag-badge {
                max-width: 100px;
                font-size: 0.7rem;
            }
            .search-wrap {
                padding: 0.4rem 1rem;
                margin-bottom: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="flowing-text">柑音手帐</h1>
            <div class="sub">✦ Tangerine Echo Journal ✦</div>
        </header>

        <div id="app">
            <div class="content-area">
                <div class="search-wrap">
                    <span class="search-icon">🔍</span>
                    <input type="text" v-model="searchQuery" placeholder="搜文章或标签喵…" />
                </div>
                <div v-if="loading" class="loading-area">
                    <div class="spinner"></div>
                    <div style="margin-top:1.2rem;">翻开书页 寻找文章…… 📖✨</div>
                </div>
                <div v-else-if="error" class="empty-area">
                    {{ error }}
                </div>
                <template v-else>
                    <div class="blog-grid">
                        <article v-for="post in paginatedPosts" :key="post.fileName" class="post-card">
                            <div class="post-header">
                                <span class="post-icon">{{ post.icon }}</span>
                                <h2 class="post-title" v-html="escapeHtml(post.title)"></h2>
                            </div>
                            <div class="post-meta">
                                <span class="meta-item">📅 {{ post.date }}</span>
                            </div>
                            <div class="post-tags" v-if="post.tags && post.tags.length">
                                <span class="post-tag" v-for="tag in post.tags" :key="tag">🏷️ {{ tag }}</span>
                            </div>
                            <div class="post-content" :ref="setContentRef(post.fileName)" v-html="post.html"></div>
                            <button class="expand-btn" v-if="isContentTall(post.fileName)" @click="toggleExpand(post.fileName)">
                                <span v-if="!expandedMap[post.fileName]">✨ 展开全文</span>
                                <span v-else>🍃 收起来</span>
                            </button>
                        </article>
                    </div>
                    <div class="pagination" v-if="totalPages > 1">
                        <button class="page-btn" :disabled="currentPage <= 1" @click="currentPage = 1">«</button>
                        <button class="page-btn" :disabled="currentPage <= 1" @click="currentPage--">‹</button>
                        <button class="page-btn" v-for="page in visiblePages" :key="page" :class="{ 'active-page': page === currentPage }" @click="currentPage = page">{{ page }}</button>
                        <button class="page-btn" :disabled="currentPage >= totalPages" @click="currentPage++">›</button>
                        <button class="page-btn" :disabled="currentPage >= totalPages" @click="currentPage = totalPages">»</button>
                    </div>
                </template>
            </div>

            <div class="floating-tag-panel" v-if="sortedTagsWithCount.length" :style="{ left: panelX + 'px', top: panelY + 'px' }" @mousedown="startDrag" @touchstart.prevent="startDragTouch" :class="{ dragging: isDragging }">
                <div class="panel-header">
                    <span>🏷️ 标签云</span>
                    <span style="font-size:0.7rem; opacity:0.7;">{{ isDragging ? '拖拽中...' : '拖我移动' }}</span>
                </div>
                <div class="panel-body" :class="{ expanded: tagCloudExpanded }">
                    <ul class="tag-list">
                        <li class="tag-badge" :class="{ 'active-tag': selectedTag === null }" @click="selectedTag = null">🍡 全部</li>
                        <li class="tag-badge" v-for="tag in sortedTagsWithCount" :key="tag.name" :class="{ 'active-tag': selectedTag === tag.name }" @click="selectedTag = (selectedTag === tag.name ? null : tag.name)" :title="tag.name">
                            <span class="tag-text">{{ tag.name }} ({{ tag.count }})</span>
                        </li>
                    </ul>
                </div>
                <button class="panel-toggle" v-if="sortedTagsWithCount.length > 5" @click="tagCloudExpanded = !tagCloudExpanded">
                    {{ tagCloudExpanded ? '🍃 收起' : '✨ 展开更多' }}
                </button>
            </div>

            <div class="lightbox" v-if="lightboxImg" @click="lightboxImg = null">
                <img :src="lightboxImg" @click.stop />
            </div>
        </div>

        <footer>
            <span class="deco-leaf">🍃 🍂 🍁</span> · 柑音手账 · <span class="deco-leaf">🌸 🍡 🎐</span>
        </footer>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, nextTick, reactive, onBeforeUnmount } = Vue;

        createApp({
            setup() {
                const loading = ref(true);
                const error = ref('');
                const posts = ref([]);
                const searchQuery = ref('');
                const selectedTag = ref(null);
                const currentPage = ref(1);
                const postsPerPage = 5;
                const expandedMap = reactive({});
                const contentHeightMap = reactive({});
                const lightboxImg = ref(null);
                const tagCloudExpanded = ref(false);

                const panelX = ref(window.innerWidth - 260);
                const panelY = ref(window.innerHeight - 420);
                const isDragging = ref(false);
                let dragOffsetX = 0;
                let dragOffsetY = 0;

                function setInitialPanelPosition() {
                    const width = window.innerWidth;
                    const height = window.innerHeight;
                    if (width <= 680) {
                        panelX.value = width - 190;
                        panelY.value = height - 320;
                    } else {
                        panelX.value = width - 260;
                        panelY.value = height - 420;
                    }
                }

                window.addEventListener('resize', () => {
                    setInitialPanelPosition();
                });

                function startDrag(e) {
                    if (e.target.tagName === 'BUTTON' || e.target.closest('.tag-badge')) return;
                    isDragging.value = true;
                    const rect = e.currentTarget.getBoundingClientRect();
                    dragOffsetX = e.clientX - rect.left;
                    dragOffsetY = e.clientY - rect.top;
                    window.addEventListener('mousemove', onDrag);
                    window.addEventListener('mouseup', stopDrag);
                }

                function startDragTouch(e) {
                    const touch = e.touches[0];
                    if (!touch) return;
                    if (e.target.tagName === 'BUTTON' || e.target.closest('.tag-badge')) return;
                    isDragging.value = true;
                    const rect = e.currentTarget.getBoundingClientRect();
                    dragOffsetX = touch.clientX - rect.left;
                    dragOffsetY = touch.clientY - rect.top;
                    window.addEventListener('touchmove', onDragTouch, { passive: false });
                    window.addEventListener('touchend', stopDragTouch);
                }

                function onDrag(e) {
                    if (!isDragging.value) return;
                    panelX.value = e.clientX - dragOffsetX;
                    panelY.value = e.clientY - dragOffsetY;
                }

                function onDragTouch(e) {
                    if (!isDragging.value) return;
                    const touch = e.touches[0];
                    if (!touch) return;
                    panelX.value = touch.clientX - dragOffsetX;
                    panelY.value = touch.clientY - dragOffsetY;
                }

                function stopDrag() {
                    isDragging.value = false;
                    window.removeEventListener('mousemove', onDrag);
                    window.removeEventListener('mouseup', stopDrag);
                }

                function stopDragTouch() {
                    isDragging.value = false;
                    window.removeEventListener('touchmove', onDragTouch);
                    window.removeEventListener('touchend', stopDragTouch);
                }

                onBeforeUnmount(() => {
                    window.removeEventListener('mousemove', onDrag);
                    window.removeEventListener('mouseup', stopDrag);
                    window.removeEventListener('touchmove', onDragTouch);
                    window.removeEventListener('touchend', stopDragTouch);
                    window.removeEventListener('resize', setInitialPanelPosition);
                });

                function getBaseFolder() {
                    const path = window.location.pathname;
                    if (path.endsWith('/')) return path;
                    const lastSlash = path.lastIndexOf('/');
                    return path.substring(0, lastSlash + 1);
                }

                function escapeHtml(str) {
                    if (!str) return '';
                    return str.replace(/[&<>]/g, function(m) {
                        if (m === '&') return '&amp;';
                        if (m === '<') return '&lt;';
                        if (m === '>') return '&gt;';
                        return m;
                    });
                }

                function extractTitleFromMarkdown(mdContent) {
                    const lines = mdContent.split(/\r?\n/);
                    for (let line of lines) {
                        if (line.startsWith('# ')) {
                            return line.substring(2).trim();
                        }
                    }
                    return null;
                }

                function parseTagsFromMarkdown(mdContent) {
                    const firstLine = mdContent.split(/\r?\n/)[0] || '';
                    const match = firstLine.match(/^tag:\s*(.+)/i);
                    if (!match) return [];
                    const raw = match[1];
                    const tags = raw.split(/[,，]/).map(t => t.trim()).filter(Boolean);
                    return tags;
                }

                function getDeterministicIcon(filename) {
                    const icons = ['🍡', '🍬', '🍘', '🍙', '🎴', '🎐', '🌸', '🍂', '🍁', '🌻', '⭐', '🍊', '🍰', '🍵', '🎀', '🧸', '🪶', '✏️', '📓', '🎋', '🍥', '🫖', '🍧', '🐱', '🐣', '🍒', '🍑', '🍓'];
                    let hash = 0;
                    for (let i = 0; i < filename.length; i++) {
                        hash = ((hash << 5) - hash) + filename.charCodeAt(i);
                        hash |= 0;
                    }
                    return icons[Math.abs(hash) % icons.length];
                }

                function formatDateFromFilename(filename) {
                    const match = filename.match(/_(\d{4})-(\d{2})-(\d{2})\.md$/);
                    if (match) {
                        return {
                            display: `${match[1]}年${match[2]}月${match[3]}日`,
                            timestamp: new Date(parseInt(match[1]), parseInt(match[2]) - 1, parseInt(match[3])).getTime()
                        };
                    }
                    const fallbackMatch = filename.match(/(\d{4})-(\d{2})-(\d{2})/);
                    if (fallbackMatch) {
                        return {
                            display: `${fallbackMatch[1]}年${fallbackMatch[2]}月${fallbackMatch[3]}日`,
                            timestamp: new Date(parseInt(fallbackMatch[1]), parseInt(fallbackMatch[2]) - 1, parseInt(fallbackMatch[3])).getTime()
                        };
                    }
                    const now = Date.now();
                    const today = new Date(now);
                    return {
                        display: `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`,
                        timestamp: now
                    };
                }

                async function loadMarkdownAndRender(fileName) {
                    const base = getBaseFolder();
                    const url = `${base}docs/${fileName}`;
                    const res = await fetch(url);
                    if (!res.ok) throw new Error(`无法加载 ${fileName}`);
                    const md = await res.text();

                    let title = extractTitleFromMarkdown(md);
                    if (!title) {
                        let name = fileName.replace(/\.md$/, '');
                        name = name.replace(/_[0-9]{4}-[0-9]{2}-[0-9]{2}$/, '');
                        name = name.replace(/[-_]/g, ' ');
                        title = name;
                    }

                    const dateInfo = formatDateFromFilename(fileName);
                    const icon = getDeterministicIcon(fileName);
                    const tags = parseTagsFromMarkdown(md);

                    const lines = md.split(/\r?\n/);
                    let cleanedMd = md;
                    if (lines[0] && /^tag:\s*.+/i.test(lines[0])) {
                        cleanedMd = lines.slice(1).join('\n');
                    }

                    let html = '';
                    if (typeof marked !== 'undefined') {
                        html = marked.parse(cleanedMd);
                        if (html instanceof Promise) html = await html;
                    } else {
                        html = `<pre>${escapeHtml(cleanedMd.substring(0,500))}</pre>`;
                    }
                    return {
                        fileName,
                        title,
                        date: dateInfo.display,
                        timestamp: dateInfo.timestamp,
                        icon,
                        html,
                        tags
                    };
                }

                async function fetchPosts() {
                    const base = getBaseFolder();
                    const listUrl = `${base}docs/list.txt`;
                    let fileNames = [];
                    try {
                        const res = await fetch(listUrl);
                        if (!res.ok) {
                            throw new Error('未找到 docs/list.txt，请创建该文件并填入 .md 文件名');
                        }
                        const text = await res.text();
                        fileNames = text.split(/\r?\n/).filter(line => line.trim().length > 0 && line.trim().endsWith('.md'));
                        if (fileNames.length === 0) {
                            throw new Error('list.txt 中没有 .md 文件');
                        }
                    } catch (err) {
                        throw new Error(`读取列表失败: ${err.message}`);
                    }

                    const loadedPosts = [];
                    for (const fileName of fileNames) {
                        try {
                            const post = await loadMarkdownAndRender(fileName);
                            loadedPosts.push(post);
                        } catch (err) {
                            console.warn(`跳过文件 ${fileName}:`, err);
                        }
                    }
                    if (loadedPosts.length === 0) {
                        throw new Error('没有成功加载任何文章，请检查 .md 文件是否存在');
                    }
                    return loadedPosts;
                }

                const sortedTagsWithCount = computed(() => {
                    const tagMap = {};
                    posts.value.forEach(p => {
                        if (p.tags) {
                            p.tags.forEach(t => {
                                if (!tagMap[t]) {
                                    tagMap[t] = { name: t, count: 0, latestTimestamp: 0 };
                                }
                                tagMap[t].count++;
                                if (p.timestamp && p.timestamp > tagMap[t].latestTimestamp) {
                                    tagMap[t].latestTimestamp = p.timestamp;
                                }
                            });
                        }
                    });
                    const tagsArray = Object.values(tagMap);
                    tagsArray.sort((a, b) => {
                        if (b.latestTimestamp !== a.latestTimestamp) return b.latestTimestamp - a.latestTimestamp;
                        return a.name.localeCompare(b.name);
                    });
                    return tagsArray;
                });

                const filteredPosts = computed(() => {
                    let result = posts.value;
                    if (selectedTag.value) {
                        result = result.filter(p => p.tags && p.tags.includes(selectedTag.value));
                    }
                    const q = searchQuery.value.trim().toLowerCase();
                    if (q) {
                        result = result.filter(p => {
                            const nameMatch = p.fileName.toLowerCase().includes(q);
                            const tagMatch = p.tags ? p.tags.some(t => t.toLowerCase().includes(q)) : false;
                            return nameMatch || tagMatch;
                        });
                    }
                    return result;
                });

                const totalPages = computed(() => Math.ceil(filteredPosts.value.length / postsPerPage) || 1);

                const paginatedPosts = computed(() => {
                    const start = (currentPage.value - 1) * postsPerPage;
                    return filteredPosts.value.slice(start, start + postsPerPage);
                });

                const visiblePages = computed(() => {
                    const total = totalPages.value;
                    const current = currentPage.value;
                    const maxVisible = 5;
                    let start = Math.max(1, current - Math.floor(maxVisible / 2));
                    let end = Math.min(total, start + maxVisible - 1);
                    if (end - start + 1 < maxVisible) {
                        start = Math.max(1, end - maxVisible + 1);
                    }
                    return Array.from({ length: end - start + 1 }, (_, i) => start + i);
                });

                const contentRefs = {};

                function setContentRef(fileName) {
                    return (el) => {
                        if (el) contentRefs[fileName] = el;
                    };
                }

                function checkContentHeight(fileName) {
                    const el = contentRefs[fileName];
                    if (!el) return;
                    const maxH = 380;
                    const tall = el.scrollHeight > maxH + 20;
                    contentHeightMap[fileName] = tall;
                    if (tall && expandedMap[fileName] === undefined) {
                        expandedMap[fileName] = false;
                    }
                }

                function isContentTall(fileName) {
                    return contentHeightMap[fileName] === true;
                }

                function toggleExpand(fileName) {
                    expandedMap[fileName] = !expandedMap[fileName];
                    nextTick(() => {
                        const el = contentRefs[fileName];
                        if (el) {
                            if (expandedMap[fileName]) {
                                el.classList.remove('collapsed');
                            } else {
                                el.classList.add('collapsed');
                            }
                        }
                    });
                }

                function applyCollapseState() {
                    Object.keys(contentRefs).forEach(fileName => {
                        const el = contentRefs[fileName];
                        if (!el) return;
                        checkContentHeight(fileName);
                        if (contentHeightMap[fileName]) {
                            if (!expandedMap[fileName]) {
                                el.classList.add('collapsed');
                            } else {
                                el.classList.remove('collapsed');
                            }
                        } else {
                            el.classList.remove('collapsed');
                        }
                    });
                }

                function handleImageClick(e) {
                    const target = e.target;
                    if (target.tagName === 'IMG' && target.closest('.post-content')) {
                        lightboxImg.value = target.src;
                    }
                }

                onMounted(async () => {
                    if (typeof marked === 'undefined') {
                        error.value = 'Markdown 解析库加载失败，请刷新页面重试';
                        loading.value = false;
                        return;
                    }
                    try {
                        const data = await fetchPosts();
                        posts.value = data;
                    } catch (err) {
                        error.value = err.message || '加载文章失败，请确保 docs 目录和 list.txt 配置正确';
                    } finally {
                        loading.value = false;
                        await nextTick();
                        if (typeof hljs !== 'undefined') {
                            document.querySelectorAll('.post-content pre code').forEach((block) => {
                                hljs.highlightElement(block);
                            });
                        }
                        applyCollapseState();
                        document.addEventListener('click', handleImageClick);
                        setInitialPanelPosition();
                    }
                });

                return {
                    loading,
                    error,
                    posts,
                    searchQuery,
                    selectedTag,
                    currentPage,
                    sortedTagsWithCount,
                    filteredPosts,
                    totalPages,
                    paginatedPosts,
                    visiblePages,
                    expandedMap,
                    lightboxImg,
                    tagCloudExpanded,
                    panelX,
                    panelY,
                    isDragging,
                    startDrag,
                    startDragTouch,
                    escapeHtml,
                    setContentRef,
                    isContentTall,
                    toggleExpand,
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
