<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=1.5">
    <title>柑音手账</title>
    <link rel="icon" type="image/png" href="icon/icon.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fef7e8 url('background.png') center/cover no-repeat fixed;
            font-family: 'Segoe UI', 'Noto Sans CJK JP', 'Helvetica Neue', 'Poppins', system-ui, -apple-system, 'Hiragino Kaku Gothic ProN', 'Yu Gothic UI', sans-serif;
            color: #3e2a1f;
            line-height: 1.6;
            padding: 2rem 1.5rem;
            background-color: #fef7e8;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: rgba(255, 250, 242, 0.75);
            border-radius: 36px;
            padding: 1.8rem 2rem;
            box-shadow: 0 8px 40px -12px rgba(100, 60, 20, 0.12);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .flowing-text {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 0.5rem;
            display: inline-block;
            background: linear-gradient(270deg,
                    #FF6B6B, #FFA07A, #FFD93D, #6BCB77, #4D96FF, #9B59B6, #FF6B6B,
                    #FFA07A, #FFD93D, #6BCB77, #4D96FF, #9B59B6, #FF6B6B);
            background-size: 500% auto;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: flowFullColor 20s linear infinite;
            will-change: background-position;
            transform: translate3d(0, 0, 0);
        }

        @keyframes flowFullColor {
            0% { background-position: 0% 50%; }
            100% { background-position: 500% 50%; }
        }

        .sub {
            color: #c2834b;
            font-size: 0.95rem;
            border-top: 2px dotted #fad7a0;
            display: inline-block;
            padding-top: 0.5rem;
            margin-top: 0.5rem;
        }

        .search-wrap {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: #fffbf4;
            border: 1px solid #ffdeac;
            border-radius: 48px;
            padding: 0.5rem 1.2rem;
            margin-bottom: 1.8rem;
            box-shadow: 0 6px 18px -8px rgba(180, 110, 30, 0.08);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-wrap:focus-within {
            border-color: #f9a65b;
            box-shadow: 0 8px 20px -8px rgba(200, 100, 20, 0.15);
        }

        .search-wrap input {
            border: none;
            background: transparent;
            font-size: 0.9rem;
            padding: 0.4rem 0;
            outline: none;
            width: 100%;
            color: #5e3a20;
            font-family: inherit;
        }

        .blog-grid {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .post-card {
            background: #fffaf2;
            border-radius: 42px 32px 48px 32px;
            box-shadow: 0 18px 32px -12px rgba(100, 60, 10, 0.12), 0 2px 5px rgba(0, 0, 0, 0.02);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            border: 1px solid #ffe1b9;
            overflow: hidden;
            will-change: transform;
        }

        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 24px 40px -16px rgba(180, 90, 30, 0.2);
            border-color: #ffce96;
        }

        .post-header {
            padding: 1.6rem 2rem 0.8rem 2rem;
            border-bottom: 2px dashed #ffe0bc;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .post-icon { font-size: 2rem; }

        .post-title {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            word-break: break-word;
            flex: 1;
            background: linear-gradient(120deg, #d96c1e, #f09d4a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .post-meta, .post-tags {
            padding: 0.2rem 2rem 0rem 2rem;
            font-size: 0.8rem;
            color: #bb7a44;
            display: flex;
            gap: 1.2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .post-tag {
            background: #ffe9d4;
            color: #9b5723;
            font-size: 0.7rem;
            padding: 0.15rem 0.8rem;
            border-radius: 40px;
            font-weight: 500;
        }

        .post-content {
            padding: 1.8rem 2rem 2rem 2rem;
            font-size: 1rem;
            color: #382617;
            position: relative;
            transition: max-height 0.35s ease;
        }

        .post-content.collapsed {
            max-height: 380px;
            overflow: hidden;
        }

        .post-content.collapsed::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(to top, #fffaf2, transparent);
            pointer-events: none;
        }

        .expand-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: #ffecd0;
            border: 1px solid #ffc68c;
            color: #b05a1f;
            padding: 0.4rem 1.6rem;
            border-radius: 50px;
            font-size: 0.8rem;
            cursor: pointer;
            margin: 0.8rem 0 1.4rem 2rem;
            transition: background 0.2s, border-color 0.2s;
            font-weight: 600;
        }

        .expand-btn:hover {
            background: #ffd59b;
            border-color: #f49b41;
        }

        .post-content h1, .post-content h2, .post-content h3 {
            margin-top: 1.2em;
            margin-bottom: 0.6em;
            color: #c25b1a;
            border-left: 6px solid #ffbc6e;
            padding-left: 1rem;
        }

        .post-content img {
            display: block;
            max-width: 320px;
            border-radius: 28px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            margin: 1.2rem auto;
            cursor: zoom-in;
            transition: transform 0.2s;
        }

        .lightbox {
            position: fixed;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.82);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: zoom-out;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 90vh;
            border-radius: 32px;
            box-shadow: 0 24px 50px rgba(0,0,0,0.3);
        }

        .loading-area, .empty-area {
            background: #fff6ed;
            border-radius: 64px;
            padding: 3rem 2rem;
            text-align: center;
            border: 1px solid #ffe0bd;
        }

        .spinner {
            display: inline-block;
            width: 48px;
            height: 48px;
            border: 4px solid #ffe1bd;
            border-top: 4px solid #e97c2b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            will-change: transform;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.6rem;
            margin-top: 2.8rem;
            flex-wrap: wrap;
        }

        .page-btn {
            background: #fff6ed;
            border: 1px solid #ffd19a;
            color: #9b5723;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
            font-size: 0.9rem;
        }

        .page-btn:hover { background: #ffe2c1; border-color: #f49b41; }
        .page-btn.active-page {
            background: #f49b41;
            border-color: #c96c1f;
            color: white;
            box-shadow: 0 6px 14px rgba(200, 90, 20, 0.25);
        }
        .page-btn:disabled { opacity: 0.4; pointer-events: none; }

        .floating-tag-panel {
            position: fixed;
            width: 240px;
            background: #fffbf4;
            border: 2px solid #ffe4bc;
            border-radius: 36px 40px;
            box-shadow: 0 20px 35px -10px rgba(180,100,20,0.2);
            z-index: 999;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            transition: opacity 0.2s, visibility 0.2s;
        }

        .panel-header {
            background: #fff8ed;
            padding: 0.7rem 1rem;
            border-bottom: 1px solid #ffe1bc;
            cursor: grab;
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            color: #c96e2b;
        }

        .panel-body {
            padding: 0.8rem 1rem;
            overflow-y: auto;
            max-height: 260px;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            list-style: none;
        }

        .tag-badge {
            background: #fff3e0;
            border: 1px solid #ffcb8c;
            color: #864c24;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            max-width: 130px;
            overflow: hidden;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
        }

        .tag-badge.active-tag {
            background: #f9a65b;
            border-color: #c96e2b;
            color: white;
        }

        .marquee-inner {
            display: flex;
            white-space: nowrap;
            will-change: transform;
        }

        .marquee-inner .marquee-copy {
            padding-right: 2rem;
            flex-shrink: 0;
        }

        .tag-badge:hover .marquee-inner {
            animation: marquee-scroll 3s linear infinite;
        }

        @keyframes marquee-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .minimized-indicator {
            position: fixed;
            top: 20px;
            right: 30px;
            background: #fffbf4;
            border: 2px solid #ffce96;
            border-radius: 60px;
            padding: 0.4rem 1.2rem;
            font-weight: 700;
            color: #c96e2b;
            box-shadow: 0 12px 24px -10px rgba(180,100,20,0.15);
            cursor: pointer;
            z-index: 1000;
            transition: background 0.2s, border-color 0.2s;
        }

        footer {
            text-align: center;
            margin-top: 4rem;
            padding: 1.8rem;
            font-size: 0.85rem;
            color: #c3844b;
            border-top: 1px solid #ffe1bb;
        }

        @media (max-width: 680px) {
            body { padding: 1rem 0.8rem; }
            .container { padding: 1rem 0.8rem; }
            .floating-tag-panel { width: 190px; }
            .tag-badge { max-width: 100px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1 class="flowing-text">柑音手帐</h1>
        <div class="sub">✦ Tangerine Echo Journal ✦</div>
    </header>

    <div id="app">
        <div class="search-wrap">
            <span class="search-icon">🔍</span>
            <input type="text" v-model="searchQuery" placeholder="搜文章或标签喵…" />
        </div>

        <div v-if="loading" class="loading-area">
            <div class="spinner"></div>
            <div>翻开书页 寻找文章…… 📖✨</div>
        </div>
        <div v-else-if="error" class="empty-area">{{ error }}</div>

        <template v-else>
            <div class="blog-grid">
                <article v-for="post in paginatedPosts" :key="post.fileName" class="post-card">
                    <div class="post-header">
                        <span class="post-icon">{{ post.icon }}</span>
                        <h2 class="post-title" v-html="escapeHtml(post.title)"></h2>
                    </div>
                    <div class="post-meta">
                        <span>📅 {{ post.date }}</span>
                    </div>
                    <div class="post-tags" v-if="post.tags?.length">
                        <span class="post-tag" v-for="tag in post.tags" :key="tag">🏷️ {{ tag }}</span>
                    </div>
                    <div class="post-content" :ref="setContentRef(post.fileName)" v-html="post.html"></div>
                    <button class="expand-btn"
                            v-if="isContentTall(post.fileName)"
                            @click="toggleExpand(post.fileName)">
                        <span v-if="!expandedMap[post.fileName]">✨ 展开全文</span>
                        <span v-else>🍃 收起来</span>
                    </button>
                </article>
            </div>

            <div class="pagination" v-if="totalPages > 1">
                <button class="page-btn" :disabled="currentPage <= 1" @click="currentPage = 1">«</button>
                <button class="page-btn" :disabled="currentPage <= 1" @click="currentPage--">‹</button>
                <button class="page-btn" v-for="page in visiblePages" :key="page"
                        :class="{ 'active-page': page === currentPage }"
                        @click="currentPage = page">{{ page }}</button>
                <button class="page-btn" :disabled="currentPage >= totalPages" @click="currentPage++">›</button>
                <button class="page-btn" :disabled="currentPage >= totalPages" @click="currentPage = totalPages">»</button>
            </div>
        </template>

        <div class="floating-tag-panel"
             v-if="sortedTagsWithCount.length && !isMinimized"
             :style="{ left: panelX + 'px', top: panelY + 'px' }"
             :class="{ dragging: isDragging }">
            <div class="panel-header"
                 @mousedown="startDrag"
                 @touchstart.prevent="startDragTouch">
                <span>🏷️ 标签云</span>
                <button class="minimize-btn"
                        @mousedown.stop @touchstart.stop
                        @click="minimizePanel">─</button>
            </div>
            <div class="panel-body">
                <ul class="tag-list">
                    <li class="tag-badge"
                        :class="{ 'active-tag': selectedTag === null }"
                        @click="selectTag(null)">🍡 全部</li>
                    <li class="tag-badge"
                        v-for="tag in sortedTagsWithCount"
                        :key="tag.name"
                        :class="{ 'active-tag': selectedTag === tag.name }"
                        @click="selectTag(tag.name)"
                        :title="tag.name">
                        <span class="marquee-inner">
                            <span class="marquee-copy">{{ tag.name }} ({{ tag.count }})</span>
                            <span class="marquee-copy">{{ tag.name }} ({{ tag.count }})</span>
                        </span>
                    </li>
                </ul>
            </div>
        </div>

        <div class="minimized-indicator"
             v-if="sortedTagsWithCount.length && isMinimized"
             @click="restorePanel">
            🏷️ 标签云
        </div>

        <div class="lightbox" v-if="lightboxImg" @click="lightboxImg = null">
            <img :src="lightboxImg" @click.stop />
        </div>
    </div>

    <footer>
        <span class="deco-leaf">🍃 🍂 🍁</span> · 柑音手账 · <span class="deco-leaf">🌸 🍡 🎐</span>
    </footer>
</div>

<script>
    const { createApp, ref, computed, onMounted, nextTick, reactive, onBeforeUnmount, watch } = Vue;

    createApp({
        setup() {
            const loading = ref(true);
            const error = ref('');
            const posts = ref([]);
            const searchQuery = ref('');
            const selectedTag = ref(null);
            const currentPage = ref(1);
            const postsPerPage = 5;
            const expandedMap = reactive({});
            const contentHeightMap = reactive({});
            const lightboxImg = ref(null);
            const isMinimized = ref(false);

            const panelX = ref(0);
            const panelY = ref(0);
            const isDragging = ref(false);
            let dragStartMouseX = 0;
            let dragStartMouseY = 0;
            let dragStartPanelX = 0;
            let dragStartPanelY = 0;

            function setInitialPanelPosition() {
                const panelW = 240;
                panelX.value = window.innerWidth - panelW - 30;
                panelY.value = window.innerHeight - 420;
            }

            function clampPanelPosition() {
                const panelW = 240;
                panelX.value = Math.min(Math.max(panelX.value, 0), window.innerWidth - panelW);
                panelY.value = Math.min(Math.max(panelY.value, 0), window.innerHeight - 60);
            }

            window.addEventListener('resize', clampPanelPosition);

            function minimizePanel() { isMinimized.value = true; }
            function restorePanel() { isMinimized.value = false; clampPanelPosition(); }

            function startDrag(e) {
                if (e.target.classList.contains('minimize-btn')) return;
                isDragging.value = true;
                dragStartMouseX = e.clientX;
                dragStartMouseY = e.clientY;
                dragStartPanelX = panelX.value;
                dragStartPanelY = panelY.value;
                window.addEventListener('mousemove', onDrag);
                window.addEventListener('mouseup', stopDrag);
            }

            function startDragTouch(e) {
                const touch = e.touches[0];
                if (!touch || e.target.classList.contains('minimize-btn')) return;
                isDragging.value = true;
                dragStartMouseX = touch.clientX;
                dragStartMouseY = touch.clientY;
                dragStartPanelX = panelX.value;
                dragStartPanelY = panelY.value;
                window.addEventListener('touchmove', onDragTouch, { passive: false });
                window.addEventListener('touchend', stopDragTouch);
            }

            function onDrag(e) {
                if (!isDragging.value) return;
                panelX.value = dragStartPanelX + (e.clientX - dragStartMouseX);
                panelY.value = dragStartPanelY + (e.clientY - dragStartMouseY);
            }

            function onDragTouch(e) {
                if (!isDragging.value) return;
                const touch = e.touches[0];
                if (!touch) return;
                panelX.value = dragStartPanelX + (touch.clientX - dragStartMouseX);
                panelY.value = dragStartPanelY + (touch.clientY - dragStartMouseY);
            }

            function stopDrag() {
                isDragging.value = false;
                window.removeEventListener('mousemove', onDrag);
                window.removeEventListener('mouseup', stopDrag);
                clampPanelPosition();
            }

            function stopDragTouch() {
                isDragging.value = false;
                window.removeEventListener('touchmove', onDragTouch);
                window.removeEventListener('touchend', stopDragTouch);
                clampPanelPosition();
            }

            onBeforeUnmount(() => {
                window.removeEventListener('mousemove', onDrag);
                window.removeEventListener('mouseup', stopDrag);
                window.removeEventListener('touchmove', onDragTouch);
                window.removeEventListener('touchend', stopDragTouch);
                window.removeEventListener('resize', clampPanelPosition);
            });

            function selectTag(tag) {
                selectedTag.value = selectedTag.value === tag ? null : tag;
                currentPage.value = 1;
            }

            function getBaseFolder() {
                const path = window.location.pathname;
                if (path.endsWith('/')) return path;
                return path.substring(0, path.lastIndexOf('/') + 1);
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m]));
            }

            function extractTitleFromMarkdown(md) {
                const lines = md.split(/\r?\n/);
                for (let line of lines) if (line.startsWith('# ')) return line.substring(2).trim();
                return null;
            }

            function parseTagsFromMarkdown(md) {
                const firstLine = md.split(/\r?\n/)[0] || '';
                const match = firstLine.match(/^tag:\s*(.+)/i);
                return match ? match[1].split(/[,，]/).map(t => t.trim()).filter(Boolean) : [];
            }

            function getDeterministicIcon(filename) {
                const icons = ['🍡','🍬','🍘','🍙','🎴','🎐','🌸','🍂','🍁','🌻','⭐','🍊','🍰','🍵','🎀','🧸','🪶','✏️','📓','🎋','🍥','🫖','🍧','🐱','🐣','🍒','🍑','🍓'];
                let hash = 0;
                for (let i = 0; i < filename.length; i++) hash = ((hash << 5) - hash) + filename.charCodeAt(i);
                return icons[Math.abs(hash) % icons.length];
            }

            function formatDateFromFilename(filename) {
                const match = filename.match(/_(\d{4})-(\d{2})-(\d{2})\.md$/);
                if (match) return {
                    display: `${match[1]}年${match[2]}月${match[3]}日`,
                    timestamp: new Date(+match[1], match[2]-1, match[3]).getTime()
                };
                const fallback = filename.match(/(\d{4})-(\d{2})-(\d{2})/);
                if (fallback) return {
                    display: `${fallback[1]}年${fallback[2]}月${fallback[3]}日`,
                    timestamp: new Date(+fallback[1], fallback[2]-1, fallback[3]).getTime()
                };
                const now = new Date();
                return { display: `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`, timestamp: Date.now() };
            }

            async function loadMarkdownAndRender(fileName) {
                const base = getBaseFolder();
                const res = await fetch(`${base}docs/${fileName}`);
                if (!res.ok) throw new Error(`无法加载 ${fileName}`);
                const md = await res.text();
                let title = extractTitleFromMarkdown(md) || fileName.replace(/\.md$/,'').replace(/_[0-9]{4}-[0-9]{2}-[0-9]{2}$/,'').replace(/[-_]/g,' ');
                const dateInfo = formatDateFromFilename(fileName);
                const icon = getDeterministicIcon(fileName);
                const tags = parseTagsFromMarkdown(md);
                let cleanedMd = md.replace(/^tag:\s*.+\n?/i, '');
                let html = typeof marked !== 'undefined' ? marked.parse(cleanedMd) : `<pre>${escapeHtml(cleanedMd.substring(0,500))}</pre>`;
                if (html instanceof Promise) html = await html;
                return { fileName, title, date: dateInfo.display, timestamp: dateInfo.timestamp, icon, html, tags };
            }

            async function fetchPosts() {
                const base = getBaseFolder();
                const res = await fetch(`${base}docs/list.txt`);
                if (!res.ok) throw new Error('未找到 docs/list.txt');
                const text = await res.text();
                const fileNames = text.split(/\r?\n/).filter(l => l.trim().endsWith('.md'));
                if (!fileNames.length) throw new Error('list.txt 中没有 .md 文件');
                const loaded = [];
                for (const fn of fileNames) {
                    try { loaded.push(await loadMarkdownAndRender(fn)); }
                    catch (err) { console.warn('跳过', fn, err); }
                }
                if (!loaded.length) throw new Error('没有成功加载任何文章');
                return loaded;
            }

            const sortedTagsWithCount = computed(() => {
                const map = {};
                posts.value.forEach(p => p.tags?.forEach(t => {
                    if (!map[t]) map[t] = { name: t, count: 0, latestTimestamp: 0 };
                    map[t].count++;
                    if (p.timestamp > map[t].latestTimestamp) map[t].latestTimestamp = p.timestamp;
                }));
                return Object.values(map).sort((a,b) => b.latestTimestamp - a.latestTimestamp || a.name.localeCompare(b.name));
            });

            const filteredPosts = computed(() => {
                let result = posts.value;
                if (selectedTag.value) result = result.filter(p => p.tags?.includes(selectedTag.value));
                const q = searchQuery.value.trim().toLowerCase();
                if (q) result = result.filter(p => p.fileName.toLowerCase().includes(q) || p.tags?.some(t => t.toLowerCase().includes(q)));
                return result;
            });

            const totalPages = computed(() => Math.ceil(filteredPosts.value.length / postsPerPage) || 1);
            const paginatedPosts = computed(() => {
                const start = (currentPage.value - 1) * postsPerPage;
                return filteredPosts.value.slice(start, start + postsPerPage);
            });
            const visiblePages = computed(() => {
                const total = totalPages.value, current = currentPage.value, max = 5;
                let start = Math.max(1, current - Math.floor(max/2));
                let end = Math.min(total, start + max - 1);
                if (end - start + 1 < max) start = Math.max(1, end - max + 1);
                return Array.from({length: end - start + 1}, (_,i) => start + i);
            });

            const contentRefs = {};
            function setContentRef(fileName) { return el => { if (el) contentRefs[fileName] = el; }; }

            function checkContentHeight(fileName) {
                const el = contentRefs[fileName];
                if (!el) return;
                const tall = el.scrollHeight > 400;
                contentHeightMap[fileName] = tall;
                if (tall && expandedMap[fileName] === undefined) expandedMap[fileName] = false;
            }

            function isContentTall(fileName) { return contentHeightMap[fileName] === true; }

            function toggleExpand(fileName) {
                expandedMap[fileName] = !expandedMap[fileName];
                nextTick(() => {
                    const el = contentRefs[fileName];
                    if (el) el.classList.toggle('collapsed', !expandedMap[fileName]);
                });
            }

            function applyCollapseState() {
                Object.keys(contentRefs).forEach(fileName => {
                    const el = contentRefs[fileName];
                    if (!el) return;
                    checkContentHeight(fileName);
                    if (contentHeightMap[fileName]) {
                        el.classList.toggle('collapsed', !expandedMap[fileName]);
                    } else {
                        el.classList.remove('collapsed');
                    }
                });
            }

            watch([filteredPosts, paginatedPosts], async () => {
                Object.keys(expandedMap).forEach(k => delete expandedMap[k]);
                Object.keys(contentHeightMap).forEach(k => delete contentHeightMap[k]);
                await nextTick();
                applyCollapseState();
            });

            function handleImageClick(e) {
                if (e.target.tagName === 'IMG' && e.target.closest('.post-content')) {
                    lightboxImg.value = e.target.src;
                }
            }

            onMounted(async () => {
                if (typeof marked === 'undefined') {
                    error.value = 'Markdown 解析库加载失败';
                    loading.value = false;
                    return;
                }
                try {
                    posts.value = await fetchPosts();
                } catch (err) {
                    error.value = err.message;
                } finally {
                    loading.value = false;
                    await nextTick();
                    if (typeof hljs !== 'undefined') {
                        document.querySelectorAll('.post-content pre code').forEach(b => hljs.highlightElement(b));
                    }
                    applyCollapseState();
                    document.addEventListener('click', handleImageClick);
                    setInitialPanelPosition();
                    clampPanelPosition();
                }
            });

            return {
                loading, error, posts, searchQuery, selectedTag, currentPage,
                sortedTagsWithCount, filteredPosts, totalPages, paginatedPosts, visiblePages,
                expandedMap, lightboxImg, isMinimized, panelX, panelY, isDragging,
                startDrag, startDragTouch, minimizePanel, restorePanel, selectTag,
                escapeHtml, setContentRef, isContentTall, toggleExpand
            };
        }
    }).mount('#app');
</script>
</body>
</html>
