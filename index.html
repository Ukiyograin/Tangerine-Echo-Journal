<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>柑音手账</title>
    <link rel="icon" type="image/png" href="icon/icon.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #fef7e8;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 235, 205, 0.6) 2%, transparent 2.5%),
                              radial-gradient(circle at 85% 70%, rgba(255, 215, 170, 0.5) 1.5%, transparent 2%);
            background-size: 48px 48px, 32px 32px;
            font-family: 'Segoe UI', 'Noto Sans CJK JP', 'Helvetica Neue', 'Poppins', system-ui, -apple-system, 'Hiragino Kaku Gothic ProN', 'Yu Gothic UI', sans-serif;
            color: #3e2a1f;
            line-height: 1.6;
            padding: 2rem 1.5rem;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
            position: relative;
        }

        .title-icon {
            font-size: 3.8rem;
            display: inline-block;
            filter: drop-shadow(0 6px 12px rgba(241, 147, 67, 0.2));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .flowing-text {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 0.5rem;
            display: inline-block;
            background: linear-gradient(270deg, 
                #FF6B6B, #FFA07A, #FFD93D, #6BCB77, #4D96FF, #9B59B6, #FF6B6B,
                #FFA07A, #FFD93D, #6BCB77, #4D96FF, #9B59B6, #FF6B6B);
            background-size: 500% auto;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: flowFullColor 20s linear infinite;
            text-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        @keyframes flowFullColor {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 500% 50%;
            }
        }

        .sub {
            color: #c2834b;
            font-size: 0.95rem;
            border-top: 2px dotted #fad7a0;
            display: inline-block;
            padding-top: 0.5rem;
            margin-top: 0.5rem;
        }

        .blog-grid {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .post-card {
            background: #fffaf2;
            border-radius: 42px 32px 48px 32px;
            box-shadow: 0 18px 32px -12px rgba(100, 60, 10, 0.12), 0 2px 5px rgba(0,0,0,0.02);
            transition: all 0.25s ease;
            border: 1px solid #ffe1b9;
            overflow: hidden;
        }

        .post-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 24px 40px -16px rgba(180, 90, 30, 0.2);
            border-color: #ffce96;
        }

        .post-header {
            padding: 1.6rem 2rem 0.8rem 2rem;
            border-bottom: 2px dashed #ffe0bc;
            display: flex;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.8rem;
        }

        .post-icon {
            font-size: 2rem;
        }

        .post-title {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            word-break: break-word;
            flex: 1;
            background: linear-gradient(120deg, #d96c1e, #f09d4a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .post-meta {
            padding: 0.2rem 2rem 0rem 2rem;
            font-size: 0.8rem;
            color: #bb7a44;
            display: flex;
            gap: 1.2rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .meta-item {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #fff1e3;
            padding: 4px 12px;
            border-radius: 40px;
        }

        .post-content {
            padding: 1.8rem 2rem 2rem 2rem;
            font-size: 1rem;
            color: #382617;
        }

        .post-content h1, .post-content h2, .post-content h3 {
            margin-top: 1.2em;
            margin-bottom: 0.6em;
            font-weight: 650;
            color: #c25b1a;
            border-left: 6px solid #ffbc6e;
            padding-left: 1rem;
        }

        .post-content p {
            margin-bottom: 1rem;
        }

        .post-content img {
            max-width: 100%;
            border-radius: 28px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.05);
            margin: 1rem 0;
        }

        .post-content code {
            background: #fcedda;
            padding: 0.2rem 0.4rem;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9em;
            color: #b9531a;
        }

        .post-content pre {
            background: #2d2118;
            padding: 1rem;
            border-radius: 24px;
            overflow-x: auto;
            margin: 1.2rem 0;
        }

        .post-content pre code {
            background: transparent;
            color: #fbe3c9;
            padding: 0;
        }

        .post-content blockquote {
            border-left: 4px solid #f3a257;
            background: #fff3e6;
            padding: 0.8rem 1.2rem;
            border-radius: 24px;
            margin: 1rem 0;
            font-style: italic;
            color: #794f2a;
        }

        .post-content a {
            color: #e0772e;
            text-decoration: none;
            border-bottom: 1px dashed #ffb469;
        }

        .post-content a:hover {
            color: #bc5a1a;
        }

        .loading-area, .empty-area {
            background: #fff6ed;
            border-radius: 64px;
            padding: 3rem 2rem;
            text-align: center;
            border: 1px solid #ffe0bd;
        }

        .spinner {
            display: inline-block;
            width: 48px;
            height: 48px;
            border: 4px solid #ffe1bd;
            border-top: 4px solid #e97c2b;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        footer {
            text-align: center;
            margin-top: 4rem;
            padding: 1.8rem;
            font-size: 0.85rem;
            color: #c3844b;
            border-top: 1px solid #ffe1bb;
        }

        .deco-leaf {
            font-size: 1.2rem;
            opacity: 0.6;
        }

        @media (max-width: 680px) {
            body { padding: 1rem; }
            .post-title { font-size: 1.5rem; }
            .post-header { padding: 1rem 1.2rem; }
            .post-content { padding: 1.2rem; }
            .post-meta { padding: 0 1rem; }
            .flowing-text { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1 class="flowing-text">柑音手帐</h1>
        <div class="sub">✦ Tangerine Echo Journal ✦</div>
    </header>
    
    <div id="app">
        <div class="blog-grid">
            <div v-if="loading" class="loading-area">
                <div class="spinner"></div>
                <div style="margin-top: 1.2rem;">翻开书页 寻找文章…… 📖✨</div>
            </div>
            <div v-else-if="error" class="empty-area">
                {{ error }}
            </div>
            <template v-else>
                <article v-for="post in posts" :key="post.fileName" class="post-card">
                    <div class="post-header">
                        <span class="post-icon">{{ post.icon }}</span>
                        <h2 class="post-title" v-html="escapeHtml(post.title)"></h2>
                    </div>
                    <div class="post-meta">
                        <span class="meta-item">📅 {{ post.date }}</span>
                    </div>
                    <div class="post-content" v-html="post.html"></div>
                </article>
            </template>
        </div>
    </div>
    
    <footer>
        <span class="deco-leaf">🍃  🍂  🍁</span>  ·  柑音手账  ·  <span class="deco-leaf">🌸  🍡  🎐</span>
    </footer>
</div>

<script>
    const { createApp, ref, onMounted, nextTick } = Vue;

    createApp({
        setup() {
            const loading = ref(true);
            const error = ref('');
            const posts = ref([]);

            function getBaseFolder() {
                const path = window.location.pathname;
                if (path.endsWith('/')) return path;
                const lastSlash = path.lastIndexOf('/');
                return path.substring(0, lastSlash + 1);
            }

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            function extractTitleFromMarkdown(mdContent) {
                const lines = mdContent.split(/\r?\n/);
                for (let line of lines) {
                    if (line.startsWith('# ')) {
                        return line.substring(2).trim();
                    }
                }
                return null;
            }

            function getRandomIconForFile(filename) {
                const icons = ['🍡', '🍬', '🍘', '🍙', '🎴', '🎐', '🌸', '🍂', '🍁', '🌻', '⭐', '🍊', '🍰', '🍵', '🎀', '🧸', '🪶', '✏️', '📓', '🎋', '🍥', '🫖', '🍧', '🐱', '🐣', '🍒', '🍑', '🍓'];
                let hash = 0;
                for (let i = 0; i < filename.length; i++) {
                    hash = ((hash << 5) - hash) + filename.charCodeAt(i);
                    hash |= 0;
                }
                return icons[Math.abs(hash) % icons.length];
            }

            function formatDateFromFilename(filename) {
                const match = filename.match(/(\d{4})-(\d{2})-(\d{2})/);
                if (match) {
                    return `${match[1]}年${match[2]}月${match[3]}日`;
                }
                const today = new Date();
                return `${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日`;
            }

            async function loadMarkdownAndRender(fileName) {
                const base = getBaseFolder();
                const url = `${base}docs/${fileName}`;
                const res = await fetch(url);
                if (!res.ok) throw new Error(`无法加载 ${fileName}`);
                const md = await res.text();
                const title = extractTitleFromMarkdown(md) || fileName.replace(/\.md$/, '').replace(/[-_]/g, ' ');
                const date = formatDateFromFilename(fileName);
                const icon = getRandomIconForFile(fileName);
                let html = '';
                if (typeof marked !== 'undefined') {
                    html = marked.parse(md);
                    if (html instanceof Promise) html = await html;
                } else {
                    html = `<pre>${escapeHtml(md.substring(0, 500))}</pre>`;
                }
                return { fileName, title, date, icon, html };
            }

            async function fetchPosts() {
                const base = getBaseFolder();
                const listUrl = `${base}docs/list.txt`;
                let fileNames = [];
                try {
                    const res = await fetch(listUrl);
                    if (!res.ok) {
                        throw new Error('未找到 docs/list.txt，请创建该文件并填入 .md 文件名');
                    }
                    const text = await res.text();
                    fileNames = text.split(/\r?\n/).filter(line => line.trim().length > 0 && line.trim().endsWith('.md'));
                    if (fileNames.length === 0) {
                        throw new Error('list.txt 中没有 .md 文件');
                    }
                } catch (err) {
                    throw new Error(`读取列表失败: ${err.message}`);
                }

                const loadedPosts = [];
                for (const fileName of fileNames) {
                    try {
                        const post = await loadMarkdownAndRender(fileName);
                        loadedPosts.push(post);
                    } catch (err) {
                        console.warn(`跳过文件 ${fileName}:`, err);
                    }
                }
                if (loadedPosts.length === 0) {
                    throw new Error('没有成功加载任何文章，请检查 .md 文件是否存在');
                }
                return loadedPosts;
            }

            onMounted(async () => {
                if (typeof marked === 'undefined') {
                    error.value = 'Markdown 解析库加载失败，请刷新页面重试';
                    loading.value = false;
                    return;
                }
                try {
                    const data = await fetchPosts();
                    posts.value = data;
                } catch (err) {
                    error.value = err.message || '加载文章失败，请确保 docs 目录和 list.txt 配置正确';
                } finally {
                    loading.value = false;
                    await nextTick();
                    if (typeof hljs !== 'undefined') {
                        document.querySelectorAll('.post-content pre code').forEach((block) => {
                            hljs.highlightElement(block);
                        });
                    }
                }
            });

            return {
                loading,
                error,
                posts,
                escapeHtml
            };
        }
    }).mount('#app');
</script>
</body>
</html>
